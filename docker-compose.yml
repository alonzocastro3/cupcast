version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cupcast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cupcast}
      POSTGRES_DB: ${POSTGRES_DB:-cupcast}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cupcast} -d ${POSTGRES_DB:-cupcast}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cupcast}:${POSTGRES_PASSWORD:-cupcast}@db:5432/${POSTGRES_DB:-cupcast}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.worker.main"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cupcast}:${POSTGRES_PASSWORD:-cupcast}@db:5432/${POSTGRES_DB:-cupcast}
      REDIS_URL: redis://redis:6379
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-900}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      # Healthy when the health file was written within 2 × SYNC_INTERVAL_SECONDS.
      # Default: 1800 s. Adjust SYNC_INTERVAL_SECONDS to change both the interval
      # and the liveness threshold automatically.
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import json, sys, time, os
          path = '/tmp/worker_health.json'
          if not os.path.exists(path):
              sys.exit(1)
          d = json.load(open(path))
          threshold = int(os.environ.get('SYNC_INTERVAL_SECONDS', 900)) * 2
          sys.exit(0 if time.time() - d['checked_at'] < threshold else 1)
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
